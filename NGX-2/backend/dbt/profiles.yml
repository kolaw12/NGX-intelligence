ngx_warehouse:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      keyfile: "{{ env_var('GCP_CREDENTIALS_PATH') }}"
      dataset: "{{ env_var('BIGQUERY_MARKET_DATASET', 'ngx_market_data') }}"
      threads: 4
      timeout_seconds: 300
      priority: interactive
