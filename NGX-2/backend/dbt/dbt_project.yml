name: ngx_warehouse
version: "1.0.0"
config-version: 2

profile: ngx_warehouse

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  ngx_warehouse:
    staging:
      +materialized: view    # zero storage; tests run against the view
    marts:
      +materialized: table   # persisted; ML/analytics scan these repeatedly

seeds:
  ngx_warehouse:
    corporate_actions:
      +column_types:
        ticker: STRING
        ex_date: DATE
        action_type: STRING
        ratio: FLOAT64
        dividend: FLOAT64
        source: STRING
        notes: STRING
