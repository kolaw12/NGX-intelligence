name: Daily NGX Data Refresh

on:
  workflow_dispatch:
  schedule:
    # Weekdays after NGX market close. GitHub cron is UTC.
    - cron: "30 16 * * 1-5"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh local data artifacts
        env:
          BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
          BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
          NEWS_MAX_ARTICLES: "50"
        run: |
          python scripts/refresh_data.py --prices --macro --news

      - name: Upload refreshed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ngx-refreshed-data
          path: |
            data/output/processed/**/*.parquet
            models/*snapshot.json
          if-no-files-found: warn
