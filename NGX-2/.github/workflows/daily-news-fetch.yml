name: Daily News Fetch

on:
  schedule:
    # 8:55 AM Nigeria time (7:55 AM UTC) - before market open
    - cron: '55 7 * * *'
    # 1:00 PM Nigeria time (12:00 PM UTC) - mid-trading
    - cron: '0 12 * * *'
    # 4:30 PM Nigeria time (3:30 PM UTC) - after market close
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Max articles per source'
        required: false
        default: '100'

# Global Environments: Every single step underneath automatically inherits these!
env:
  PYTHONUNBUFFERED: '1'
  PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}
  # Shared Database Secrets & Variables
  POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
  POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
  POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
  POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
  POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE || 'require' }}
  POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS || '730' }}

concurrency:
  group: daily-news-fetch
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-news.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-news.txt

      - name: Write GCP service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Fetch NGX Announcements and BusinessDay news
        env:
          NEWS_SOURCES: ngx,businessday
          NEWS_MAX_ARTICLES: ${{ github.event.inputs.max_articles || '100' }}
          NUPAT_DISABLE_FINBERT: '0'
          # BigQuery Configuration
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
          BIGQUERY_RAW_DATASET: ${{ vars.BIGQUERY_RAW_DATASET }}
          # Mode for News script execution
          DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE || 'hybrid' }}
        run: python -m data.pipeline news
        

      - name: 3. Commit news and sentiment data back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/output/ || true
          if git diff --cached --quiet; then
            echo "No new news/sentiment data to commit — skipping."
          else
            git commit -m "chore: daily news + sentiment update [skip ci]"
            git push origin HEAD
            echo "✓ News and sentiment data committed and pushed."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload news and sentiment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: completed-news-sentiment
          path: |
            data/logs/
            data/output/
            nupat_daily_package_*.json
          retention-days: 7
          if-no-files-found: ignore
