name: Daily price refresh

on:
  schedule:
    # 17:15 UTC = 18:15 WAT, Mon-Fri — comfortably after NGX 14:30 WAT close.
    # Off-the-hour avoids GH Actions top-of-hour runner contention.
    - cron: "15 17 * * 1-5"
  workflow_dispatch:   # manual trigger from the Actions tab

concurrency:
  group: daily-pipeline
  cancel-in-progress: false   # never abort an in-flight run

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # CI IP triggers BroadStreet backoffs; local is ~10-15min

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-daily.txt

      - name: Install dependencies
        run: pip install -r requirements-daily.txt

      - name: Write GCP service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Run daily pipeline
        env:
          # BroadStreet scrape
          BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
          BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
          # BigQuery
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
          BIGQUERY_RAW_DATASET: ${{ vars.BIGQUERY_RAW_DATASET }}
          # Postgres (Neon)
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE }}
          POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS }}
          # Mode
          DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE }}
          ARCHIVE_GITHUB: ${{ vars.ARCHIVE_GITHUB }}
        run: python -m data.pipeline daily

      # Stage 6: news ingestion — runs after price so a news failure never
      # blocks price data from reaching the warehouse.
      # continue-on-error: true means a broken scraper doesn't fail the whole
      # workflow and doesn't block the dbt quality gate downstream.
      - name: Run news pipeline
        continue-on-error: true
        env:
          NEWS_MAX_ARTICLES: ${{ vars.NEWS_MAX_ARTICLES }}
        run: python -m data.pipeline news

      - name: Build daily sentiment summary
        continue-on-error: true
        run: python -m data.pipeline sentiment-summary

      # ---- Quality gate (Lane A) — runs only if the pipeline above succeeded.
      # Default GH behavior skips subsequent steps after a failure, which is
      # what we want: a broken scrape shouldn't drown in quality-test noise
      # about a warehouse state that didn't actually change.

      - name: dbt deps
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: dbt source freshness
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt source freshness --project-dir dbt --profiles-dir dbt

      - name: dbt build (data-quality tests)
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt build --project-dir dbt --profiles-dir dbt

      - name: Cross-store consistency check
        env:
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE }}
          POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: python scripts/check_cross_store.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            data/logs/
            dbt/target/
          if-no-files-found: ignore
          retention-days: 14
