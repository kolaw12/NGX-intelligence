name: Daily price refresh

on:
  schedule:
    # 17:15 UTC = 18:15 WAT, Mon-Fri — comfortably after NGX 14:30 WAT close.
    - cron: "15 17 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-daily.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-daily.txt
          python -c "import sqlalchemy; print(f'SQLAlchemy {sqlalchemy.__version__} installed')"

      - name: Write GCP service-account key
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Run daily pipeline
        working-directory: backend
        env:
          BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
          BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
          BIGQUERY_RAW_DATASET: ${{ vars.BIGQUERY_RAW_DATASET }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
          POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE || 'require' }}
          POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS || '730' }}
          DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE || 'hybrid' }}
          ARCHIVE_GITHUB: ${{ vars.ARCHIVE_GITHUB }}
        run: python -m data.pipeline daily

      - name: Run macro pipeline
        working-directory: backend
        env:
          BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
          BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
        run: python -m data.pipeline macro

      - name: Export model snapshot
        working-directory: backend
        run: python scripts/export_xgboost_snapshot.py

      - name: dbt deps
        working-directory: backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: dbt source freshness
        working-directory: backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt source freshness --project-dir dbt --profiles-dir dbt

      - name: dbt build (data-quality tests)
        working-directory: backend
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
        run: dbt build --project-dir dbt --profiles-dir dbt

      - name: Cross-store consistency check
        working-directory: backend
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ vars.POSTGRES_PORT || '5432' }}
          POSTGRES_DATABASE: ${{ secrets.POSTGRES_DATABASE }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE || 'require' }}
          POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS || '730' }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
          BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
          BIGQUERY_RAW_DATASET: ${{ vars.BIGQUERY_RAW_DATASET }}
          DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE || 'hybrid' }}
        run: python scripts/check_cross_store.py

      - name: Refresh API cache
        if: success()
        continue-on-error: true
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${API_BASE_URL}/api/v1/admin/refresh" \
            -H "X-Admin-Key: ${ADMIN_SECRET}" \
            --max-time 15)
          echo "Cache refresh HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || echo "Warning: cache refresh returned $STATUS (non-fatal)"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: |
            backend/data/logs/
            backend/dbt/target/
          if-no-files-found: ignore
          retention-days: 14
