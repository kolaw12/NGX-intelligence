name: Weekly XGBoost retrain

on:
  schedule:
    # Sunday 02:00 UTC — after the weekend, before Monday's market open
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      min_auc:
        description: "Minimum AUC-ROC threshold (default 0.55)"
        required: false
        default: "0.55"
      dry_run:
        description: "Train but do not save model (true/false)"
        required: false
        default: "false"

concurrency:
  group: weekly-retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-daily.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-daily.txt

      - name: Retrain XGBoost model
        working-directory: backend
        env:
          BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
          BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE }}
          DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE }}
        run: |
          MIN_AUC="${{ github.event.inputs.min_auc || '0.55' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS="--min-auc $MIN_AUC"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          python scripts/train_xgboost.py $ARGS

      - name: Export updated model snapshot
        working-directory: backend
        run: python scripts/export_xgboost_snapshot.py

      - name: Refresh API cache
        continue-on-error: true
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${API_BASE_URL}/api/v1/admin/refresh" \
            -H "X-Admin-Key: ${ADMIN_SECRET}" \
            --max-time 15)
          echo "Cache refresh HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || echo "Warning: cache refresh returned $STATUS (non-fatal)"

      - name: Upload retrain metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-metrics-${{ github.run_id }}
          path: backend/models/last_retrain_metrics.json
          if-no-files-found: ignore
          retention-days: 90
