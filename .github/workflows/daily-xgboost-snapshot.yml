name: Daily XGBoost signal snapshot

on:
  workflow_dispatch:
  schedule:
    # 18:30 WAT on weekdays, after the existing price refresh window.
    - cron: "30 17 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-xgboost-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      BROADSTREET_USERNAME: ${{ secrets.BROADSTREET_USERNAME }}
      BROADSTREET_PASSWORD: ${{ secrets.BROADSTREET_PASSWORD }}
      BASE_URL: ${{ secrets.BASE_URL }}
      LOGIN_ENDPOINT: ${{ secrets.LOGIN_ENDPOINT }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      BIGQUERY_MARKET_DATASET: ${{ vars.BIGQUERY_MARKET_DATASET }}
      BIGQUERY_RAW_DATASET: ${{ vars.BIGQUERY_RAW_DATASET }}
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_SSLMODE: ${{ vars.POSTGRES_SSLMODE }}
      POSTGRES_PRICE_WINDOW_DAYS: ${{ vars.POSTGRES_PRICE_WINDOW_DAYS }}
      DATA_WAREHOUSE_MODE: ${{ vars.DATA_WAREHOUSE_MODE }}
      ARCHIVE_GITHUB: ${{ vars.ARCHIVE_GITHUB }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-daily.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-daily.txt

      - name: Write GCP service-account key
        if: ${{ env.GCP_SA_KEY != '' }}
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa.json"

      - name: Refresh market data when credentials exist
        if: ${{ env.BROADSTREET_USERNAME != '' && env.BROADSTREET_PASSWORD != '' }}
        working-directory: backend
        env:
          GCP_CREDENTIALS_PATH: ${{ runner.temp }}/gcp-sa.json
        run: python -m data.pipeline daily

      - name: Export XGBoost frontend snapshot
        run: python backend/scripts/export_xgboost_snapshot.py

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Commit refreshed model snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/models/model_signal_snapshot.json frontend/src/data/xgboost-signals.snapshot.json
          git diff --cached --quiet || git commit -m "chore: refresh xgboost signal snapshot"
          git push
