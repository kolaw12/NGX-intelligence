name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes, 24/7
  workflow_dispatch:           # manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://ngx-intelligence.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Backend is alive"
          else
            echo "✗ Backend returned $STATUS — may be waking up (normal for first ping after sleep)"
          fi
